services:
  omnigate:
    build: .
    container_name: omnigate
    ports:
      - "8787:8787"
    env_file:
      - .env
    volumes:
      - omnigate_data:/app/.data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bun -e \"fetch('http://localhost:8787/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  omnigate_data:
