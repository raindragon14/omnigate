providers:
  - id: opencode_zen_deepseek
    base_url: "https://opencode.ai/zen/v1"
    model: "deepseek-v4-flash-free"
    api_key_env: "OPENCODE_API_KEY"
    family: "deepseek-v4-flash"
    priority: 100
    quality_score: 90
    speed_score: 85
    enabled: true
    context: 200000
    supports_tools: true
    supports_json: true
    supports_streaming: true
    rate_limit:
      rpm: 10

  - id: opencode_zen_mimo
    base_url: "https://opencode.ai/zen/v1"
    model: "mimo-v2.5-free"
    api_key_env: "OPENCODE_API_KEY"
    family: "mimo-v2.5"
    priority: 98
    quality_score: 82
    speed_score: 90
    enabled: true
    context: 200000
    supports_tools: true
    supports_json: true
    supports_streaming: true
    rate_limit:
      rpm: 10

  - id: openrouter_nemotron_3_nano_omni_free
    base_url: "https://openrouter.ai/api/v1"
    model: "nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free"
    api_key_env: "OPENROUTER_API_KEY"
    family: "nemotron-3-nano-omni"
    priority: 88
    quality_score: 80
    speed_score: 82
    enabled: true
    context: 256000
    supports_tools: true
    supports_json: false
    supports_streaming: true
    rate_limit:
      rpm: 20
      rpd: 50

  - id: openrouter_poolside_laguna_xs2_free
    base_url: "https://openrouter.ai/api/v1"
    model: "poolside/laguna-xs.2:free"
    api_key_env: "OPENROUTER_API_KEY"
    family: "laguna-xs.2"
    priority: 86
    quality_score: 76
    speed_score: 92
    enabled: true
    context: 262144
    supports_tools: true
    supports_json: false
    supports_streaming: true
    rate_limit:
      rpm: 20
      rpd: 50

aliases:
  omnigate/deepseek-v4-flash-auto:
    families: ["deepseek-v4-flash"]
  omnigate/mimo-v2.5-auto:
    families: ["mimo-v2.5"]
  omnigate/coding-balanced:
    families: ["deepseek-v4-flash", "mimo-v2.5", "nemotron-3-nano-omni"]
  omnigate/coding-fast:
    families: ["mimo-v2.5", "deepseek-v4-flash", "laguna-xs.2"]
    weights:
      speed: 5
      quality: 0.5
    tiebreak: speed
