# Provider registry template.
#
# OmniGate is provider-neutral. Add, remove, or edit entries to pool whichever
# services you want. Each provider's `api_key_env` must have a matching value
# in your `.env` file.
#
# Fields:
#   id            unique identifier used internally for routing stats
#   base_url      OpenAI-compatible chat-completions endpoint
#   model         the model name the upstream service expects
#   api_key_env   environment variable holding the upstream API key
#   family        routing group; aliases map to one or more families
#   priority      tiebreaker when scores are equal (higher wins)
#   quality_score 0-100, used by the quality routing mode
#   speed_score   0-100, used by the speed routing mode
#   enabled       set to false to exclude without removing the entry
#   rate_limit    optional {rpm, rph, rpd} for quota-pressure scoring
#   supports_*    optional feature flags used for request matching
#
# Aliases below map public model names to provider families.

providers:
  - id: provider_a
    base_url: "https://api.provider-a.example/v1"
    model: "provider-a-model"
    api_key_env: "PROVIDER_A_API_KEY"
    family: "chat-fast"
    priority: 90
    quality_score: 80
    speed_score: 90
    enabled: true
    supports_tools: true
    supports_json: true
    supports_streaming: true
    rate_limit:
      rpm: 20

  - id: provider_b
    base_url: "https://api.provider-b.example/v1"
    model: "provider-b-model"
    api_key_env: "PROVIDER_B_API_KEY"
    family: "chat-quality"
    priority: 90
    quality_score: 92
    speed_score: 80
    enabled: true
    supports_tools: true
    supports_json: true
    supports_streaming: true
    rate_limit:
      rpm: 20

  - id: provider_c
    base_url: "https://api.provider-c.example/v1"
    model: "provider-c-model"
    api_key_env: "PROVIDER_C_API_KEY"
    family: "coding-fast"
    priority: 90
    quality_score: 85
    speed_score: 90
    enabled: true
    supports_tools: true
    supports_json: true
    supports_streaming: true
    rate_limit:
      rpm: 20

  - id: provider_d
    base_url: "https://api.provider-d.example/v1"
    model: "provider-d-model"
    api_key_env: "PROVIDER_D_API_KEY"
    family: "chat-balanced"
    priority: 88
    quality_score: 88
    speed_score: 85
    enabled: true
    supports_tools: true
    supports_json: true
    supports_streaming: true
    rate_limit:
      rpm: 20

aliases:
  omnigate/auto-fast:
    families: ["chat-fast", "chat-balanced"]
  omnigate/auto-quality:
    families: ["chat-quality", "chat-balanced"]
  omnigate/coding-auto:
    families: ["coding-fast", "chat-quality"]
  omnigate/coding-fast:
    families: ["coding-fast"]
    weights:
      speed: 5
      quality: 0.5
    tiebreak: speed
