providers:
  - id: opencode_zen_deepseek
    base_url: "https://opencode.ai/zen/v1"
    model: "deepseek-v4-flash-free"
    api_key_env: "OPENCODE_API_KEY"
    family: "deepseek-v4-flash"
    priority: 100
    quality_score: 90
    speed_score: 85
    enabled: true
    context: 200000
    supports_tools: true
    supports_json: true
    supports_streaming: true
    rate_limit:
      rpm: 10

  - id: opencode_zen_mimo
    base_url: "https://opencode.ai/zen/v1"
    model: "mimo-v2.5-free"
    api_key_env: "OPENCODE_API_KEY"
    family: "mimo-v2.5"
    priority: 98
    quality_score: 82
    speed_score: 90
    enabled: true
    context: 200000
    supports_tools: true
    supports_json: true
    supports_streaming: true
    supports_multimodal: false
    rate_limit:
      rpm: 10

  - id: openrouter_deepseek_free
    base_url: "https://openrouter.ai/api/v1"
    model: "deepseek/deepseek-v4-flash:free"
    api_key_env: "OPENROUTER_API_KEY"
    family: "deepseek-v4-flash"
    priority: 90
    quality_score: 86
    speed_score: 80
    enabled: true
    context: 1000000
    supports_tools: true
    supports_json: true
    supports_streaming: true
    supports_multimodal: false
    rate_limit:
      rpm: 20
      rpd: 50

aliases:
  omnigate/deepseek-v4-flash-auto:
    families: ["deepseek-v4-flash"]
  omnigate/mimo-v2.5-auto:
    families: ["mimo-v2.5"]
  omnigate/coding-balanced:
    families: ["deepseek-v4-flash", "mimo-v2.5"]
  omnigate/coding-fast:
    families: ["mimo-v2.5", "deepseek-v4-flash"]
