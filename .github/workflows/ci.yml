name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun test

  docker:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: omnigate:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — start container
        run: |
          docker run -d \
            --name omnigate-test \
            -p 8787:8787 \
            -e OMNIGATE_API_KEY=ci-omnigate-key \
            omnigate:ci

      - name: Smoke test — wait for health
        run: |
          for i in $(seq 1 15); do
            sleep 2
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8787/health 2>/dev/null || echo "000")
            if [ "$status" = "200" ]; then
              echo "Health check passed (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $status — waiting..."
          done
          echo "Container failed to become healthy"
          docker logs omnigate-test 2>&1 || true
          exit 1

      - name: Smoke test — verify response body
        run: |
          body=$(curl -s http://localhost:8787/health)
          echo "Response: $body"
          echo "$body" | grep -q '"status":"ok"' || { echo "Unexpected response"; exit 1; }

      - name: Smoke test — verify /v1/models
        run: |
          body=$(curl -s -H "Authorization: Bearer ci-omnigate-key" http://localhost:8787/v1/models)
          echo "$body" | grep -q 'omnigate/deepseek-v4-flash-auto' || { echo "Models endpoint missing aliases"; exit 1; }

      - name: Clean up container
        if: always()
        run: docker rm -f omnigate-test 2>/dev/null || true

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,suffix=,format=short

      - name: Push to registry
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
